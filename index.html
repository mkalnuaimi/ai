<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE — AI News</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: #020617;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE</header>

<div class="container">
  <div class="grid" id="news"></div>
</div>

<script>

const titles = [
"تطورات جديدة في الذكاء الاصطناعي",
"إطلاق منصة AI متقدمة",
"تحسينات في مراكز البيانات",
"ثورة في تعلم الآلة",
"نمو تطبيقات الذكاء الاصطناعي",
"تقنيات جديدة في الحوسبة السحابية",
"تحديثات في الأنظمة الذكية",
"توسع عالمي في AI",
"حلول مبتكرة للبيانات الضخمة",
"تقنيات مستقبلية جديدة"
];

const sources = ["TechCrunch","Reuters","BBC","Wired","The Verge","MIT Tech"];

const news = [];

// توليد 120 خبر احترافي
for (let i = 0; i < 120; i++) {
  news.push({
    title: titles[Math.floor(Math.random()*titles.length)],
    image: `https://picsum.photos/400/200?random=${i}`,
    source: sources[Math.floor(Math.random()*sources.length)],
    date: "2026"
  });
}

// عرض الأخبار
function display() {
  const container = document.getElementById("news");

  news.forEach(n => {
    container.innerHTML += `
      <div class="card">
        <img src="${n.image}">
        <div class="content">
          <div class="title">${n.title}</div>
          <div class="meta">${n.source} • ${n.date}</div>
        </div>
      </div>
    `;
  });
}

display();

</script>

</body>
</html>
