<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE X</title>

<style>
body {margin:0;font-family:system-ui;background:#020617;color:white}
header {padding:20px;text-align:center;font-size:30px}

.container {max-width:1200px;margin:auto;padding:20px}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;border-radius:14px;
  overflow:hidden;cursor:pointer;transition:0.3s;
}
.card:hover {transform:translateY(-5px)}

.card img {width:100%;height:170px;object-fit:cover}

.content {padding:12px}
.title {font-size:16px;margin-bottom:10px}
.meta {font-size:12px;opacity:0.6}

.modal {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;justify-content:center;align-items:center;
}

.modal-box {
  background:#020617;width:90%;max-width:800px;
  border-radius:14px;overflow:hidden;
}

.modal img {width:100%;height:250px;object-fit:cover}
.modal-body {padding:20px}

.close {
  position:absolute;top:20px;right:20px;
  font-size:25px;cursor:pointer;
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE X</header>

<div class="container">
  <div class="grid" id="news"></div>
</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <div class="modal-box">
    <img id="mImg">
    <div class="modal-body">
      <h2 id="mTitle"></h2>
      <p id="mText"></p>
    </div>
  </div>
</div>

<script>

// 🔥 عناوين احترافية
const titles = [
"إطلاق نموذج ذكاء اصطناعي جديد يغير قواعد اللعبة",
"تطورات مذهلة في مراكز البيانات السحابية",
"شركات التقنية تتجه نحو أتمتة العمليات بالكامل",
"تحسين أداء الخوارزميات في التعلم العميق",
"تقنيات جديدة لتقليل استهلاك الطاقة في السيرفرات",
"الذكاء الاصطناعي يدخل مجال الأمن السيبراني بقوة",
"توسع عالمي في استخدام الذكاء الاصطناعي",
"حلول مبتكرة لتحليل البيانات الضخمة",
"تطبيقات جديدة تعتمد على الذكاء الاصطناعي",
"تحسينات كبيرة في أنظمة التشغيل الذكية"
];

// نصوص خبر واقعية
const texts = [
"شهدت الفترة الأخيرة تطورات متسارعة في مجال الذكاء الاصطناعي، حيث تعمل الشركات العالمية على تحسين الأداء وزيادة الكفاءة بشكل غير مسبوق.",
"تشير التقارير إلى أن البنية التحتية لمراكز البيانات أصبحت أكثر تطوراً، مع اعتماد تقنيات حديثة تقلل من استهلاك الطاقة.",
"يواصل قطاع التكنولوجيا الاستثمار في الحلول الذكية التي تساهم في تسريع العمليات وتحسين تجربة المستخدم.",
"أظهرت الدراسات أن استخدام الخوارزميات المتقدمة يساهم بشكل كبير في تحسين جودة التحليل واتخاذ القرار.",
"تعمل الشركات حالياً على تطوير أنظمة أكثر أماناً ومرونة لمواجهة التحديات التقنية المتزايدة."
];

// توليد 150 خبر
const news = [];

for(let i=0;i<150;i++){
  news.push({
    title: titles[Math.floor(Math.random()*titles.length)],
    text: texts[Math.floor(Math.random()*texts.length)],
    image: `https://picsum.photos/400/200?random=${i}`
  });
}

// عرض
function display(){
  const container = document.getElementById("news");

  news.forEach((n,i)=>{
    container.innerHTML += `
      <div class="card" onclick="openModal(${i})">
        <img src="${n.image}">
        <div class="content">
          <div class="title">${n.title}</div>
          <div class="meta">Tech News • 2026</div>
        </div>
      </div>
    `;
  });
}

// فتح
function openModal(i){
  const n = news[i];
  document.getElementById("modal").style.display="flex";
  document.getElementById("mImg").src=n.image;
  document.getElementById("mTitle").innerText=n.title;
  document.getElementById("mText").innerText=n.text;
}

// إغلاق
function closeModal(){
  document.getElementById("modal").style.display="none";
}

display();

</script>

</body>
</html>
