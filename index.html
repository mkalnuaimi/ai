<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE — AI News</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  background: #020617;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.title {
  font-size: 18px;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}

/* النافذة */
.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  max-width:700px;
  width:90%;
  border-radius:14px;
  overflow:hidden;
}

.modal img {
  width:100%;
  height:250px;
  object-fit:cover;
}

.modal-body {
  padding:20px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE</header>

<div class="container">
  <div class="grid" id="news"></div>
</div>

<!-- النافذة -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <div class="modal-content">
    <img id="modalImg">
    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
    </div>
  </div>
</div>

<script>

const news = [];

// توليد 120 خبر
for (let i = 1; i <= 120; i++) {
  news.push({
    title: "تطورات جديدة في الذكاء الاصطناعي",
    image: `https://picsum.photos/400/200?random=${i}`,
    text: "هذا نص كامل للخبر يوضح تفاصيل أكثر عن الموضوع والتقنيات المستخدمة والتطورات الحديثة في عالم الذكاء الاصطناعي."
  });
}

// عرض الأخبار
function display() {
  const container = document.getElementById("news");

  news.forEach((n, index) => {
    container.innerHTML += `
      <div class="card" onclick="openModal(${index})">
        <img src="${n.image}">
        <div class="content">
          <div class="title">${n.title}</div>
        </div>
      </div>
    `;
  });
}

// فتح الخبر
function openModal(i) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = news[i].image;
  document.getElementById("modalTitle").innerText = news[i].title;
  document.getElementById("modalText").innerText = news[i].text;
}

// إغلاق
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

display();

</script>

</body>
</html>
