<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE AI NEWS</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
h1 { margin: 20px; }
#search {
  padding: 10px;
  width: 60%;
  margin-bottom: 20px;
}
#news {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card a {
  color: cyan;
}
</style>
</head>

<body>

<h1>🧠 NEURALPULSE AI NEWS</h1>
<input type="text" id="search" placeholder="ابحث عن خبر...">

<div id="news"></div>

<script>
const API_KEY = "e1a3805fbe9e9f5915f8a8eafb7c8d9b";
let articles = [];

async function getNews() {
  try {
    const url = `https://gnews.io/api/v4/search?q=artificial intelligence OR AI OR ChatGPT&lang=en&max=10&apikey=${API_KEY}`;
    
    const res = await fetch(url);
    const data = await res.json();

    articles = data.articles;
    showNews(articles);

  } catch (err) {
    document.getElementById("news").innerHTML = "⚠️ خطأ في جلب الأخبار";
  }
}

function showNews(list) {
  const container = document.getElementById("news");
  container.innerHTML = "";

  list.forEach(n => {
    container.innerHTML += `
      <div class="card">
        <img src="${n.image || ''}">
        <h3>${n.title}</h3>
        <p>${n.description || ''}</p>
        <small>${n.source.name}</small><br>
        <a href="${n.url}" target="_blank">قراءة المزيد</a>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  const filtered = articles.filter(a => a.title.toLowerCase().includes(val));
  showNews(filtered);
});

getNews();
</script>

</body>
</html>
