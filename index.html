<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE — AI News</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  background: #020617;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.title {
  font-size: 18px;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}

.loading {
  text-align: center;
  margin-top: 50px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE</header>

<div class="container">
  <div id="loading" class="loading">⏳ جاري تحميل الأخبار...</div>
  <div class="grid" id="news"></div>
</div>

<script>

// 🔑 مفتاح GNews
const API_KEY = "e1a3805fbe9e9f5915f8a8eafb7c8d9b";

// جلب الأخبار
async function getNews() {
  try {
    const res = await fetch(`https://gnews.io/api/v4/search?q=artificial intelligence&lang=ar,en&max=100&apikey=${API_KEY}`);
    const data = await res.json();

    const container = document.getElementById("news");
    const loading = document.getElementById("loading");

    loading.style.display = "none";

    data.articles.forEach(n => {
      container.innerHTML += `
        <div class="card" onclick="openNews('${n.url}')">
          <img src="${n.image || 'https://via.placeholder.com/400x200'}">
          <div class="content">
            <div class="title">${n.title}</div>
            <div class="meta">${n.source.name} • ${new Date(n.publishedAt).toLocaleDateString()}</div>
          </div>
        </div>
      `;
    });

  } catch (error) {
    document.getElementById("loading").innerHTML = "⚠️ خطأ في جلب الأخبار";
  }
}

// فتح الخبر الحقيقي
function openNews(url) {
  window.open(url, "_blank");
}

getNews();

</script>

</body>
</html>
