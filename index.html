<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE PRO</title>

<style>
body {
  font-family: Arial;
  background:#0b0f1a;
  color:#fff;
  padding:20px;
}
h1 {color:#4f7aff}
.news {background:#111827;margin:10px 0;padding:15px;border-radius:10px}
</style>
</head>

<body>

<h1>🔥 NEURALPULSE PRO — أخبار AI</h1>
<button onclick="fetchNews()">تحديث</button>

<div id="news"></div>

<script>

// =====================
// CONFIG
// =====================
const API_KEY = "e1a3805fbe9e9f5915f8a8eafb7c8d9b";

// =====================
// TRANSLATION CACHE
// =====================
const cache = new Map();

async function translate(text){
  if(!text) return "";
  if(cache.has(text)) return cache.get(text);

  try{
    const res = await fetch("https://libretranslate.de/translate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        q:text,
        source:"en",
        target:"ar"
      })
    });

    const data = await res.json();
    cache.set(text,data.translatedText);
    return data.translatedText;

  }catch{
    return text;
  }
}

// =====================
// FETCH NEWS
// =====================
async function fetchNews(){

  document.getElementById("news").innerHTML = "جاري التحميل...";

  try{

    const url = `https://newsapi.org/v2/top-headlines?q=artificial intelligence&language=en&pageSize=10&apiKey=${API_KEY}`;
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    const data = await res.json();

    if(data.status !== "ok") throw "API Error";

    let html = "";

    for(const article of data.articles){

      const title = await translate(article.title);
      const desc  = await translate(article.description);

      html += `
        <div class="news">
          <h3>${title}</h3>
          <p>${desc}</p>
          <a href="${article.url}" target="_blank">قراءة الخبر</a>
        </div>
      `;
    }

    document.getElementById("news").innerHTML = html;

  }catch(e){
    document.getElementById("news").innerHTML = "⚠️ خطأ في جلب الأخبار";
  }
}

// =====================
// START
// =====================
fetchNews();

</script>

</body>
</html>
