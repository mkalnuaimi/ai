<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE X</title>

<style>
body {margin:0;font-family:system-ui;background:#020617;color:white}
header {padding:20px;text-align:center;font-size:30px}

.container {max-width:1200px;margin:auto;padding:20px}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;border-radius:14px;
  padding:15px;cursor:pointer;transition:0.3s;
}
.card:hover {transform:translateY(-5px)}

.title {font-size:16px;margin-bottom:10px}
.meta {font-size:12px;opacity:0.6}

.loading {
  text-align:center;margin-top:40px
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE X</header>

<div class="container">
  <div id="loading" class="loading">⏳ جاري تحميل الأخبار...</div>
  <div class="grid" id="news"></div>
</div>

<script>

// 🔥 RSS من Google News (AI)
const RSS = "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=artificial+intelligence&hl=en&gl=US&ceid=US:en";

async function loadNews(){
  try {
    const res = await fetch(RSS);
    const data = await res.json();

    document.getElementById("loading").style.display="none";

    if (!data.items || data.items.length === 0) {
      document.getElementById("news").innerHTML = "⚠️ لا توجد أخبار";
      return;
    }

    data.items.forEach(n=>{
      document.getElementById("news").innerHTML += `
        <div class="card" onclick="openNews('${n.link}')">
          <div class="title">${n.title}</div>
          <div class="meta">${n.pubDate}</div>
        </div>
      `;
    });

  } catch(e){
    document.getElementById("loading").innerHTML="⚠️ فشل التحميل";
  }
}

function openNews(url){
  window.open(url,"_blank");
}

loadNews();

</script>

</body>
</html>
