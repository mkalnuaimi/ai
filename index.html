<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE AI NEWS</title>

<style>
body {
  font-family: Arial;
  background:#0b0f1a;
  color:#fff;
  padding:20px;
}
h1 {color:#4f7aff}
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4f7aff;
  color:#fff;
  cursor:pointer;
}
.news {
  background:#111827;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
}
a {color:#4f7aff}
</style>
</head>

<body>

<h1>🧠 NEURALPULSE — أخبار الذكاء الاصطناعي</h1>
<button onclick="fetchNews()">تحديث</button>

<div id="news">جاري تحميل الأخبار...</div>

<script>

// 🔑 ضع مفتاحك
const API_KEY = "e1a3805fbe9e9f5915f8a8eafb7c8d9b";

// 🔥 Proxy لحل CORS
const PROXY = "https://api.allorigins.win/raw?url=";

// =====================
async function fetchNews(){

  document.getElementById("news").innerHTML = "جاري تحميل الأخبار...";

  try{

    const url = `https://newsapi.org/v2/top-headlines?q=artificial intelligence&language=en&pageSize=10&apiKey=${API_KEY}`;

    const res = await fetch(PROXY + encodeURIComponent(url));
    const data = await res.json();

    if(data.status !== "ok"){
      throw new Error(data.message);
    }

    let html = "";

    data.articles.forEach(article => {

      html += `
        <div class="news">
          <h3>${article.title}</h3>
          <p>${article.description || ""}</p>
          <a href="${article.url}" target="_blank">📖 قراءة الخبر</a>
        </div>
      `;
    });

    document.getElementById("news").innerHTML = html;

  }catch(e){
    document.getElementById("news").innerHTML =
      "⚠️ تعذر جلب الأخبار — تحقق من المفتاح أو الإنترنت";
  }
}

// تشغيل تلقائي
fetchNews();

</script>

</body>
</html>
