<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURALPULSE PRO</title>

<style>
:root {
  --bg:#020617;
  --card:#0f172a;
  --accent:#38bdf8;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:white;
}

header {
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-bottom:1px solid #1e293b;
}

.container {
  max-width:1300px;
  margin:auto;
  padding:20px;
}

/* HERO */
.hero {
  border-radius:16px;
  overflow:hidden;
  margin-bottom:25px;
  position:relative;
}

.hero img {
  width:100%;
  height:320px;
  object-fit:cover;
}

.hero .text {
  position:absolute;
  bottom:0;
  padding:20px;
  background:linear-gradient(transparent,black);
  width:100%;
}

/* SEARCH */
.search {
  margin-bottom:20px;
}

.search input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
}

.card img {
  width:100%;
  height:170px;
  object-fit:cover;
}

.content {
  padding:12px;
}

.title {
  font-size:15px;
  margin-bottom:8px;
}

.meta {
  font-size:12px;
  opacity:0.6;
}

/* LOADING */
.loading {
  text-align:center;
  margin-top:40px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  width:90%;
  max-width:800px;
  background:var(--bg);
  border-radius:14px;
  overflow:hidden;
}

.modal img {
  width:100%;
  height:250px;
  object-fit:cover;
}

.modal-body {
  padding:20px;
}

.btn {
  background:var(--accent);
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🚀 NEURALPULSE PRO</header>

<div class="container">

<div id="hero" class="hero"></div>

<div class="search">
  <input id="search" placeholder="🔍 ابحث عن خبر...">
</div>

<div id="loading" class="loading">⏳ جاري تحميل الأخبار...</div>

<div class="grid" id="news"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <div class="modal-box">
    <img id="mImg">
    <div class="modal-body">
      <h2 id="mTitle"></h2>
      <p id="mDesc"></p>
      <br>
      <button class="btn" id="mLink">قراءة الخبر</button>
    </div>
  </div>
</div>

<script>

// مصادر RSS
const feeds = [
"https://news.google.com/rss/search?q=artificial+intelligence",
"https://feeds.bbci.co.uk/news/technology/rss.xml"
];

// تحويل RSS
function rss(url){
  return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
}

let allNews = [];

async function load(){
  try {
    for(let f of feeds){
      const res = await fetch(rss(f));
      const data = await res.json();
      if(data.items) allNews.push(...data.items);
    }

    document.getElementById("loading").style.display="none";

    if(allNews.length === 0){
      document.getElementById("news").innerHTML="⚠️ لا توجد أخبار";
      return;
    }

    render();

  } catch(e){
    document.getElementById("loading").innerHTML="⚠️ فشل التحميل";
  }
}

// عرض
function render(){
  const container = document.getElementById("news");
  container.innerHTML="";

  let filtered = allNews;

  const q = document.getElementById("search").value.toLowerCase();
  filtered = filtered.filter(n=>n.title.toLowerCase().includes(q));

  // HERO
  if(filtered[0]){
    document.getElementById("hero").innerHTML = `
      <img src="${filtered[0].thumbnail || 'https://picsum.photos/800/400'}">
      <div class="text">
        <h2>${filtered[0].title}</h2>
      </div>
    `;
  }

  filtered.slice(0,100).forEach((n,i)=>{
    container.innerHTML += `
      <div class="card" onclick="openModal(${i})">
        <img loading="lazy" src="${n.thumbnail || 'https://picsum.photos/400/200'}">
        <div class="content">
          <div class="title">${n.title}</div>
          <div class="meta">${n.pubDate}</div>
        </div>
      </div>
    `;
  });
}

// فتح
function openModal(i){
  const n = allNews[i];
  document.getElementById("modal").style.display="flex";
  document.getElementById("mImg").src=n.thumbnail || '';
  document.getElementById("mTitle").innerText=n.title;
  document.getElementById("mDesc").innerText="اضغط لقراءة الخبر الكامل من المصدر الرسمي.";
  document.getElementById("mLink").onclick=()=>window.open(n.link);
}

// إغلاق
function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("input",render);

load();

</script>

</body>
</html>
